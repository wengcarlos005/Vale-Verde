# Blueprint de deploy no Render (https://render.com).
# Servidor Node persistente com WebSocket — funciona no plano FREE.
#
# SALVAR PROGRESSO DE GRAÇA: o free do Render não tem disco, mas o jogo faz
# backup do banco na nuvem via Turso (grátis). Depois de criar a database no
# Turso, preencha TURSO_DATABASE_URL e TURSO_AUTH_TOKEN nas Environment do
# serviço no Render (passo a passo no DEPLOY.md). Sem essas variáveis o jogo
# roda igual, mas a fazenda zera quando o serviço reinicia.
services:
  - type: web
    name: vale-verde
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
