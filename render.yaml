# Blueprint de deploy no Render (https://render.com).
# Servidor Node persistente com WebSocket + disco para o SQLite.
services:
  - type: web
    name: vale-verde
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
